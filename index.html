<!DOCTYPE html>
<html>
<head>
  <title>AI Chat Bolt ⚡</title>

  <style>
    body{
      margin:0;
      padding:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      width:900px;
      background:white;
      border-radius:20px;
      overflow:hidden;
      display:flex;
      box-shadow:0 8px 30px rgba(0,0,0,0.2);
    }

    /* Left Side Image */
    .left{
      width:50%;
      background:url('https://share.google/rLjiEnCeCtcTXwL5I') center/cover no-repeat;
      min-height:550px;
    }

    /* Right Side Form */
    .right{
      width:50%;
      padding:40px;
      text-align:center;
    }

    h1{
      color:darkblue;
      margin-bottom:10px;
    }

    .welcome{
      font-size:28px;
      color:#ff9800;
      margin-bottom:20px;
      animation: glow 1.5s infinite alternate;
    }

    @keyframes glow{
      from{
        text-shadow:0 0 5px gold;
      }
      to{
        text-shadow:0 0 20px orange;
      }
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:15px;
      border:none;
      border-radius:8px;
      background:darkblue;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:navy;
    }

    .error{
      color:red;
      font-size:14px;
      margin-top:5px;
    }

    .success{
      color:green;
      font-size:16px;
      margin-top:10px;
    }

    a{
      display:inline-block;
      margin-top:15px;
      text-decoration:none;
      color:red;
      font-weight:bold;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- Left Image -->
  <div class="left"></div>

  <!-- Right Login -->
  <div class="right">

    <div class="welcome">✨ Welcome to AI Chat Bolt ⚡ ✨</div>

    <!-- Step 1 -->
    <div id="step1">
      <h1>Login</h1>

      <input type="email" id="email" placeholder="Enter Email ID">

      <input type="password" id="password" placeholder="Enter Password">

      <div class="error" id="error1"></div>

      <button onclick="sendCode()">Send Code</button>
    </div>

    <!-- Step 2 -->
    <div id="step2" style="display:none;">
      <h1>Verification</h1>

      <p>Code sent to <span id="showEmail"></span></p>

      <input type="text" id="otp" placeholder="Enter 6-digit code">

      <div class="error" id="error2"></div>

      <button onclick="verifyCode()">Verify</button>
    </div>

    <!-- Step 3 -->
    <div id="step3" style="display:none;">
      <h1>Your Name</h1>

      <input type="text" id="name" placeholder="Enter Your Name">

      <div class="error" id="error3"></div>

      <button onclick="finishLogin()">Continue</button>
    </div>

    <!-- Step 4 -->
    <div id="step4" style="display:none;">
      <h1>✨ Welcome <span id="finalName"></span> ✨</h1>

      <p class="success">
        You are successfully signed in to AI Chat Bolt ⚡
      </p>

      <a href="https://chat.openai.com" target="_blank">
        Open ChatGPT
      </a>
    </div>

  </div>

</div>

<script>

let generatedOTP = "";

function sendCode(){

  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();

  if(email === "" || password === ""){
    document.getElementById("error1").innerText =
      "Please enter email and password";
    return;
  }

  document.getElementById("error1").innerText = "";

  generatedOTP =
    Math.floor(100000 + Math.random() * 900000).toString();

  alert("Demo OTP: " + generatedOTP);

  document.getElementById("showEmail").innerText = email;

  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}

function verifyCode(){

  let enteredOTP = document.getElementById("otp").value.trim();

  if(enteredOTP !== generatedOTP){
    document.getElementById("error2").innerText =
      "Wrong OTP. Try again.";
    return;
  }

  document.getElementById("error2").innerText = "";

  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "block";
}

function finishLogin(){

  let name = document.getElementById("name").value.trim();

  if(name === ""){
    document.getElementById("error3").innerText =
      "Please enter your name";
    return;
  }

  document.getElementById("finalName").innerText = name;

  document.getElementById("step3").style.display = "none";
  document.getElementById("step4").style.display = "block";
}

</script>

</body>
</html>
